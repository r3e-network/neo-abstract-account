name: Supabase Migrations

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-migrations.yml'
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-migrations.yml'

jobs:
  replay:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v6
      - name: Create Supabase API roles
        run: psql -v ON_ERROR_STOP=1 -c 'create role anon nologin; create role authenticated nologin;'
      - name: Replay migration chain in filename order
        run: |
          set -euo pipefail
          for file in supabase/migrations/*.sql; do
            echo "==> ${file}"
            psql -v ON_ERROR_STOP=1 --single-transaction -f "${file}"
          done
      - name: Assert replayed end state
        run: psql -v ON_ERROR_STOP=1 --single-transaction -f supabase/tests/replay_assertions.sql
